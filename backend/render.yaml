services:
  - type: web
    name: workout-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false           # Set this manually in Render dashboard to your Supabase connection string
      - key: SYNC_TOKEN
        generateValue: true   # Render auto-generates a secret token
